<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Sin conexión | StudioFlow</title>
    <style>
      :root { color-scheme: light dark; }
      html, body {
        height: 100%;
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        background: #0D0E14;
        color: #FCFCFD;
      }
      body {
        display: grid;
        place-items: center;
        text-align: center;
        padding: 2rem;
      }
      .card { max-width: 420px; }
      h1 { font-size: 1.75rem; margin: 0 0 .5rem; font-weight: 600; }
      p { color: #9aa0aa; line-height: 1.5; margin: 0 0 1.5rem; }
      button {
        background: #FCFCFD; color: #0D0E14;
        border: 0; padding: .65rem 1.25rem; border-radius: .5rem;
        font: inherit; font-weight: 500; cursor: pointer;
      }
      button:hover { opacity: .9; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Sin conexión</h1>
      <p>StudioFlow necesita conexión para cargar esta vista. Las galerías guardadas siguen disponibles.</p>
      <button onclick="location.reload()">Reintentar</button>
    </div>
  </body>
</html>
