name: Deploy to VPS (StudioFlow CRM)

# Despliega a IONOS VPS (CloudPanel) vía SSH:
#   1. Conecta directo como `studioflow` (no como root — least privilege).
#   2. git fetch + reset --hard origin/<branch>
#   3. npm ci
#   4. prisma generate (best-effort si aplica)
#   5. npm run build (Next.js)
#   6. pm2 restart studioflow --update-env
#   7. Smoke check /api/healthz (200 = OK).
#
# Secrets requeridos:
#   SSH_HOST           = 108.175.15.195
#   SSH_USER           = studioflow
#   SSH_PRIVATE_KEY    = contenido de /root/gha-deploy/id_ed25519 en el VPS
#   SSH_PORT           = 22  (opcional)
#
# La key SSH_PRIVATE_KEY está restringida al user `studioflow` del VPS
# (authorized_keys), NO da acceso a root. Si se filtra, el atacante solo
# puede tocar /home/studioflow/ y ejecutar pm2 restart del CRM.

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'components/**'
      - 'lib/**'
      - 'server/**'
      - 'public/**'
      - 'prisma/**'
      - 'types/**'
      - 'middleware.ts'
      - 'next.config.mjs'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-vps.yml'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch a deployar'
        required: false
        default: 'main'

concurrency:
  group: vps-deploy-studioflow
  cancel-in-progress: false

jobs:
  deploy:
    name: SSH deploy → studioflow@abbypixel-vps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          missing=""
          [ -z "$SSH_HOST" ] && missing="$missing SSH_HOST"
          [ -z "$SSH_USER" ] && missing="$missing SSH_USER"
          [ -z "$SSH_KEY" ]  && missing="$missing SSH_PRIVATE_KEY"
          if [ -n "$missing" ]; then
            echo "::error::Faltan secrets:$missing"
            echo "Configurar en: https://github.com/${{ github.repository }}/settings/secrets/actions"
            exit 1
          fi

      - name: Setup SSH key
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy via SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
          DEPLOY_BRANCH: ${{ github.event.inputs.branch || github.ref_name }}
        run: |
          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" -o StrictHostKeyChecking=no \
            "$SSH_USER@$SSH_HOST" "BRANCH=$DEPLOY_BRANCH bash -lse" <<'REMOTE'
            set -e
            cd ~/htdocs/my.abbypixel.com
            export NVM_DIR=$HOME/.nvm
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh" || true

            echo "=== git fetch + reset --hard origin/$BRANCH ==="
            git fetch origin "$BRANCH"
            git reset --hard "origin/$BRANCH"

            echo "=== npm ci ==="
            npm ci --no-audit --no-fund --silent

            echo "=== prisma generate (best-effort) ==="
            npx --no-install prisma generate 2>/dev/null || echo "(prisma no aplica o ya generado)"

            echo "=== next build ==="
            npm run build

            echo "=== pm2 restart studioflow ==="
            pm2 restart studioflow --update-env

            echo "=== status ==="
            pm2 status studioflow
          REMOTE

      - name: Health check
        run: |
          sleep 8
          code=$(curl -s -o /dev/null -w "%{http_code}" https://my.abbypixel.com/api/healthz)
          echo "Health endpoint returned: $code"
          if [ "$code" != "200" ]; then
            echo "::warning::Health check non-200 (got $code) — verificar logs en VPS"
          fi
