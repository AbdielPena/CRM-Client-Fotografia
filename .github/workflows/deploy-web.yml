name: Deploy Web to BanaHosting

# Trigger: push a main que toque archivos del código web.
# Buildea Next.js, arma un deploy-package/ con solo lo que va al server,
# lo sube por FTP en un solo paso, y dispara restart de Phusion Passenger.

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "components/**"
      - "lib/**"
      - "server/**"
      - "emails/**"
      - "supabase/migrations/**"
      - "middleware.ts"
      - "instrumentation.ts"
      - "next.config.mjs"
      - "next-env.d.ts"
      - "tailwind.config.ts"
      - "postcss.config.js"
      - "tsconfig.json"
      - "package.json"
      - "package-lock.json"
      - "public/**"
      - "server.js"
  workflow_dispatch:

concurrency:
  group: deploy-web-prod
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_APP_URL: https://my.abbypixel.com
          NEXTAUTH_URL: https://my.abbypixel.com
          NEXT_PUBLIC_SUPABASE_URL: https://kbrcqyjnrbjlzfolpcsx.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_Nh-ot-oVKy46FpSiF7UASA_FIcHMeOk

      # Armamos un directorio limpio con SOLO lo que va al server.
      # Así evitamos los bugs de exclude/include de FTP-Deploy-Action.
      - name: Build deploy package
        run: |
          mkdir -p deploy-package
          cp -r .next deploy-package/.next
          cp -r public deploy-package/public
          cp server.js deploy-package/server.js
          mkdir -p deploy-package/tmp
          date -u +"%Y-%m-%dT%H:%M:%SZ" > deploy-package/tmp/restart.txt
          echo "--- deploy-package contents ---"
          ls -la deploy-package/
          du -sh deploy-package/.next deploy-package/public

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.BH_FTP_HOST }}
          username: ${{ secrets.BH_FTP_USER }}
          password: ${{ secrets.BH_FTP_PASS }}
          local-dir: ./deploy-package/
          # La cuenta FTP está chrooted al home (~/), no a ~/my/.
          # Por eso prefijamos con "my/".
          server-dir: ./my/
          log-level: standard

      - name: Health check
        run: |
          # Esperamos 12s para que Phusion Passenger reinicie
          sleep 12
          curl -f -sS -m 30 https://my.abbypixel.com/api/health
