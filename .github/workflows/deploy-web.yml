name: Deploy Web to BanaHosting

# Trigger: push a main que toque archivos del código web.
# Buildea Next.js, sube .next/ + public/ + server.js via FTP, y deja
# tmp/restart.txt para que Phusion Passenger reinicie la app.
#
# No corre cuando solo cambian docs, scripts de Tauri o Capacitor.

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "components/**"
      - "lib/**"
      - "server/**"
      - "emails/**"
      - "supabase/migrations/**"
      - "middleware.ts"
      - "instrumentation.ts"
      - "next.config.mjs"
      - "next-env.d.ts"
      - "tailwind.config.ts"
      - "postcss.config.js"
      - "tsconfig.json"
      - "package.json"
      - "package-lock.json"
      - "public/**"
      - "server.js"
  workflow_dispatch:

concurrency:
  group: deploy-web-prod
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_APP_URL: https://my.abbypixel.com
          NEXTAUTH_URL: https://my.abbypixel.com
          NEXT_PUBLIC_SUPABASE_URL: https://kbrcqyjnrbjlzfolpcsx.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_Nh-ot-oVKy46FpSiF7UASA_FIcHMeOk

      # Generamos un archivo restart.txt con timestamp para que Phusion
      # Passenger detecte el cambio y reinicie la app después del deploy.
      - name: Create restart marker
        run: |
          mkdir -p tmp
          date -u +"%Y-%m-%dT%H:%M:%SZ" > tmp/restart.txt

      # Empacamos solo lo que va al server. Excluimos node_modules y .git.
      # NO subimos .env.production.local (vive solo en el server).
      - name: Deploy .next/ via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.BH_FTP_HOST }}
          username: ${{ secrets.BH_FTP_USER }}
          password: ${{ secrets.BH_FTP_PASS }}
          local-dir: ./.next/
          server-dir: my/.next/
          dangerous-clean-slate: true

      - name: Deploy public/ via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.BH_FTP_HOST }}
          username: ${{ secrets.BH_FTP_USER }}
          password: ${{ secrets.BH_FTP_PASS }}
          local-dir: ./public/
          server-dir: my/public/

      - name: Deploy server.js via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.BH_FTP_HOST }}
          username: ${{ secrets.BH_FTP_USER }}
          password: ${{ secrets.BH_FTP_PASS }}
          local-dir: ./
          server-dir: my/
          exclude: |
            **/*
            !server.js

      - name: Trigger app restart (tmp/restart.txt)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.BH_FTP_HOST }}
          username: ${{ secrets.BH_FTP_USER }}
          password: ${{ secrets.BH_FTP_PASS }}
          local-dir: ./tmp/
          server-dir: my/tmp/

      - name: Health check
        run: |
          # Esperamos 12s para que Phusion reinicie y verificamos /api/health
          sleep 12
          curl -f -sS -m 30 https://my.abbypixel.com/api/health
